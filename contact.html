<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <style>
        body {
            background-color: rgb(27, 27, 27);
            color: white;
            margin: 0;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 30px;
            border-bottom: 2px solid white;
        }

        h3 {
            color: white;
            margin: 0;
        }

        .bar {
            display: flex;
            gap: 25px;
        }

        .bar a:hover {
            transform: scale(1.2);
            color: orangered;
        }

        a {
            color: white;
            text-decoration: none;
        }

        .contact-box {
            width: 380px;
            margin: 40px auto;
            padding: 25px;
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 4px solid orangered;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        }

        .contact-box h2 {
            margin-top: 0;
            margin-bottom: 8px;
        }

        .contact-box p {
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input,
        textarea {
            padding: 11px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.06);
            color: white;
            outline: none;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: fit-content;
            padding: 11px 20px;
            border: none;
            background-color: orangered;
            color: white;
            cursor: pointer;
            font-size: 15px;
            margin-top: 5px;
        }

        button:hover {
            background-color: rgb(220, 50, 0);
        }

        /* This ensures the box stays centered and page doesn't scroll unnecessarily */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="top-bar">
        <h3>AMINAKE <span style="color: orangered;">DERILINE MAYICHOP</span></h3>
        <div class="bar">
            <a href="home.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="skills.html">Skills</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="main-content">
        <div class="contact-box">
            <h2>Contact Me</h2>
            <p>Fill the form below to send me a message.</p>

            <form action="https://formsubmit.co/derilineaminake23@gmail.com" method="post">
                <label for="name">Name</label>
                <input type="text" id="name" name="Name" placeholder="Enter your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="Email" placeholder="Enter your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="Message" placeholder="Write your message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>
    </div>

</body>

</html>
